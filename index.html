<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team NOC — Aristocrat Interactive</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
:root{
  --green:#2E7D32;--green-light:#43A047;
  --black:#0A0A0A;--panel:#111111;--card:#1A1A1A;--card-hover:#222222;
  --border:rgba(67,160,71,0.2);--border-strong:rgba(67,160,71,0.45);
  --text:#F0F0F0;--text2:#888;
  --pending:#E0A020;--inprog:#2196F3;--done:#43A047;--blocked:#E53935;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--black);display:flex;flex-direction:column;}
.wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:var(--panel);border-bottom:1px solid var(--border-strong);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo{width:32px;height:32px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff;}
.brand{display:flex;flex-direction:column;line-height:1.15;}
.brand-name{font-size:12px;font-weight:700;color:var(--green-light);letter-spacing:.08em;text-transform:uppercase;}
.brand-sub{font-size:10px;color:var(--green-light);font-weight:600;letter-spacing:.12em;text-transform:uppercase;}
.split{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:0;overflow:hidden;}
.pane{display:flex;flex-direction:column;border-right:1px solid var(--border);min-height:0;overflow:hidden;}
.pane:last-child{border-right:none;}
.pane-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--panel);flex-shrink:0;}
.pane-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;}
.pane-title i{font-size:15px;color:var(--green-light);}
.add-row{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.add-row input{flex:1;background:#222;border:1px solid var(--border-strong);border-radius:5px;padding:6px 10px;font-size:12px;color:var(--text);outline:none;}
.add-row input:focus{border-color:var(--green-light);}
.add-row input::placeholder{color:var(--text2);}
.add-row button{background:var(--green);border:none;border-radius:5px;padding:6px 12px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;text-transform:uppercase;}
.add-row button:hover{background:var(--green-light);}
.items{flex:1;overflow:hidden;padding:8px 10px;display:flex;flex-direction:column;gap:6px;min-height:0;}
.item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px 14px;display:flex;align-items:center;gap:14px;flex:1;transition:background .12s,border-color .12s;min-height:0;}
.item:hover{background:var(--card-hover);border-color:var(--border-strong);}
.item-text{flex:1;min-width:0;}
.item-title{font-size:17px;font-weight:700;color:var(--text);line-height:1.3;}
.item-date{font-size:11px;color:var(--text2);margin-top:4px;}
.item-actions{display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .12s;flex-shrink:0;}
.item:hover .item-actions{opacity:1;}
.ibtn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:3px 5px;border-radius:4px;transition:background .1s,color .1s;}
.ibtn:hover{background:rgba(67,160,71,.12);color:var(--green-light);}
.ibtn.del:hover{background:rgba(229,57,53,.1);color:var(--blocked);}
.ibtn.save-btn:hover{background:rgba(67,160,71,.18);color:var(--done);}
.ibtn.cancel-btn:hover{background:rgba(229,57,53,.08);color:var(--blocked);}
.edit-input{flex:1;background:#1e1e1e;border:1px solid var(--green-light);border-radius:5px;padding:5px 8px;font-size:17px;font-weight:700;color:var(--text);outline:none;line-height:1.3;width:100%;}
.status-block{width:100px;flex-shrink:0;border-radius:6px;padding:8px 4px;text-align:center;font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;position:relative;}
.status-block.pending{background:rgba(224,160,32,.18);color:var(--pending);border:1px solid rgba(224,160,32,.4);}
.status-block.inprog{background:rgba(33,150,243,.18);color:var(--inprog);border:1px solid rgba(33,150,243,.4);}
.status-block.done{background:rgba(67,160,71,.18);color:var(--done);border:1px solid rgba(67,160,71,.4);}
.status-block.blocked{background:rgba(229,57,53,.18);color:var(--blocked);border:1px solid rgba(229,57,53,.4);}
.smenu{position:absolute;right:0;top:calc(100% + 3px);background:var(--panel);border:1px solid var(--border-strong);border-radius:7px;z-index:99;min-width:130px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.sopt{padding:7px 11px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;text-transform:uppercase;color:var(--text);letter-spacing:.03em;}
.sopt:hover{background:rgba(67,160,71,.12);}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;flex:1;color:var(--text2);}
.empty i{font-size:28px;opacity:.35;}
.empty p{font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">A</div>
    <div class="brand">
      <span class="brand-name">Aristocrat Interactive</span>
      <span class="brand-sub">Team NOC</span>
    </div>
  </div>
  <div class="split">
    <div class="pane">
      <div class="pane-header">
        <div class="pane-title"><i class="ti ti-server"></i>Operations</div>
      </div>
      <div class="add-row">
        <input id="ops-input" type="text" placeholder="Item Title" onkeydown="if(event.key==='Enter')addItem('ops')">
        <button onclick="addItem('ops')">ADD ITEM</button>
      </div>
      <div class="items" id="ops-list"></div>
    </div>
    <div class="pane">
      <div class="pane-header">
        <div class="pane-title"><i class="ti ti-clipboard-list"></i>Tasks</div>
      </div>
      <div class="add-row">
        <input id="tasks-input" type="text" placeholder="Item Title" onkeydown="if(event.key==='Enter')addItem('tasks')">
        <button onclick="addItem('tasks')">ADD ITEM</button>
      </div>
      <div class="items" id="tasks-list"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig={
  projectId:"team-noc-77deb",
  databaseURL:"https://team-noc-77deb-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const boardRef=ref(db,"nocBoard");
const SC={Pending:'pending','In Progress':'inprog',Done:'done',Blocked:'blocked'};
const SC_COLOR={Pending:'#E0A020','In Progress':'#2196F3',Done:'#43A047',Blocked:'#E53935'};
let data={
  ops:[
    {id:1,title:'NHL PROD - Windows Update Fixes',status:'Pending',date:new Date('2026-05-27T06:37:21')},
    {id:2,title:'NCEL - Maintenance - DBA Prod - Rebuild PlayersTransactions - Elad',status:'In Progress',date:new Date('2026-05-27T09:10:00')},
    {id:3,title:'DB backup verification - all regions',status:'Blocked',date:new Date('2026-05-27T07:45:00')},
    {id:4,title:'Monitor prod servers health check',status:'Done',date:new Date('2026-05-26T14:20:00')},
  ],
  tasks:[
    {id:5,title:'Review firewall rules update',status:'Pending',date:new Date('2026-05-27T08:00:00')},
    {id:6,title:'SSL certificate renewal - prod',status:'In Progress',date:new Date('2026-05-26T11:00:00')},
  ]
};
let nid=10,openMenu=null,editingId=null,isReady=false,isSaving=false;

function esc(v){
  return String(v).replace(/[&<>"']/g,ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

function normalizeBoard(saved){
  const fallback={ops:[],tasks:[]};
  const next=saved&&saved.data?saved.data:fallback;
  for(const pane of ['ops','tasks']){
    if(!Array.isArray(next[pane]))next[pane]=[];
    next[pane]=next[pane].map(item=>({
      id:Number(item.id),
      title:String(item.title||''),
      status:SC[item.status]?item.status:'Pending',
      date:new Date(item.date||Date.now())
    })).filter(item=>Number.isFinite(item.id)&&item.title);
  }
  return {
    data:next,
    nid:Number(saved&&saved.nid)||Math.max(1,...next.ops.concat(next.tasks).map(item=>item.id))+1
  };
}

function serializeBoard(){
  return {
    data:{
      ops:data.ops.map(item=>({...item,date:item.date.toISOString()})),
      tasks:data.tasks.map(item=>({...item,date:item.date.toISOString()}))
    },
    nid
  };
}

function saveData(){
  if(!isReady||isSaving)return;
  isSaving=true;
  set(boardRef,serializeBoard())
    .catch(err=>{
      console.error('Firebase save failed:',err);
      alert('Firebase save failed. Check Realtime Database rules and connection.');
    })
    .finally(()=>{isSaving=false;});
}

function fmt(d){
  return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'})+', '+
    d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}

function render(pane){
  const el=document.getElementById(pane+'-list');
  const items=data[pane];
  if(!items.length){
    el.innerHTML='<div class="empty"><i class="ti ti-inbox-off"></i><p>No items</p></div>';
    return;
  }
  el.innerHTML=items.map(t=>{
    const isEditing=editingId===t.id;
    const sc=SC[t.status]||'pending';
    return `<div class="item" id="item-${t.id}">
      ${isEditing
        ? `<input class="edit-input" id="edit-${t.id}" value="${esc(t.title)}" onkeydown="handleEditKey(event,'${pane}',${t.id})">`
        : `<div class="item-text">
            <div class="item-title">${esc(t.title)}</div>
            <div class="item-date">${fmt(t.date)}</div>
          </div>`
      }
      <div class="item-actions" style="opacity:${isEditing?1:''}">
        ${isEditing
          ? `<button class="ibtn save-btn" onclick="saveEdit('${pane}',${t.id})" title="Save"><i class="ti ti-check"></i></button>
             <button class="ibtn cancel-btn" onclick="cancelEdit('${pane}')" title="Cancel"><i class="ti ti-x"></i></button>`
          : `<button class="ibtn" onclick="startEdit('${pane}',${t.id})" title="Edit"><i class="ti ti-pencil"></i></button>
             <button class="ibtn del" onclick="delItem('${pane}',${t.id})" title="Delete"><i class="ti ti-trash"></i></button>`
        }
      </div>
      ${!isEditing?`<div class="status-block ${sc}" onclick="toggleMenu(${t.id},'${pane}',event)" style="position:relative;">
        ${t.status}
        <div class="smenu" id="smenu-${t.id}" style="display:none;">
          ${Object.keys(SC).map(s=>`<div class="sopt" onclick="setStatus('${pane}',${t.id},'${s}')"><span class="sdot" style="background:${SC_COLOR[s]}"></span>${s}</div>`).join('')}
        </div>
      </div>`:''}
    </div>`;
  }).join('');
  if(editingId!==null){
    const inp=document.getElementById('edit-'+editingId);
    if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
  }
}

function renderAll(){render('ops');render('tasks');}

function addItem(pane){
  const inp=document.getElementById(pane+'-input');
  const v=inp.value.trim();
  if(!v)return;
  data[pane].unshift({id:nid++,title:v,status:'Pending',date:new Date()});
  inp.value='';
  render(pane);
  saveData();
}

function delItem(pane,id){
  data[pane]=data[pane].filter(t=>t.id!==id);
  if(editingId===id)editingId=null;
  render(pane);
  saveData();
}

function startEdit(pane,id){editingId=id;render(pane);}

function saveEdit(pane,id){
  const inp=document.getElementById('edit-'+id);
  const v=inp?inp.value.trim():'';
  if(v){const t=data[pane].find(x=>x.id===id);if(t)t.title=v;}
  editingId=null;render(pane);
  saveData();
}

function cancelEdit(pane){editingId=null;render(pane);}

function handleEditKey(e,pane,id){
  if(e.key==='Enter')saveEdit(pane,id);
  if(e.key==='Escape')cancelEdit(pane);
}

function toggleMenu(id,pane,e){
  e.stopPropagation();
  const m=document.getElementById('smenu-'+id);
  if(openMenu&&openMenu!==m)openMenu.style.display='none';
  const show=m.style.display==='none';
  m.style.display=show?'block':'none';
  openMenu=show?m:null;
}

function setStatus(pane,id,status){
  const t=data[pane].find(x=>x.id===id);
  if(t)t.status=status;
  if(openMenu){openMenu.style.display='none';openMenu=null;}
  render(pane);
  saveData();
}

document.addEventListener('click',()=>{
  if(openMenu){openMenu.style.display='none';openMenu=null;}
});

onValue(boardRef,snapshot=>{
  const saved=snapshot.val();
  if(saved){
    const board=normalizeBoard(saved);
    data=board.data;
    nid=board.nid;
    isReady=true;
    renderAll();
    return;
  }
  isReady=true;
  renderAll();
  saveData();
},err=>{
  console.error('Firebase load failed:',err);
  isReady=true;
  renderAll();
  alert('Firebase load failed. Check Realtime Database rules and connection.');
});

Object.assign(window,{
  addItem,delItem,startEdit,saveEdit,cancelEdit,handleEditKey,toggleMenu,setStatus
});
</script>
</body>
</html>
