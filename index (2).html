<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Team — Aristocrat Interactive</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
:root{
  --green:#2E7D32;--green-light:#43A047;
  --black:#0A0A0A;--panel:#111111;--card:#1A1A1A;--card-hover:#222222;
  --border:rgba(67,160,71,0.2);--border-strong:rgba(67,160,71,0.45);
  --text:#F0F0F0;--text2:#888;
  --pending:#E0A020;--inprog:#2196F3;--done:#43A047;--blocked:#E53935;
}
html,body{height:100%;}
body{background:var(--black);display:flex;flex-direction:column;min-height:100vh;}
.wrap{display:flex;flex-direction:column;height:100vh;}
.topbar{background:var(--panel);border-bottom:1px solid var(--border-strong);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo{width:36px;height:36px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;}
.brand{display:flex;flex-direction:column;line-height:1.15;}
.brand-name{font-size:14px;font-weight:700;color:var(--green-light);letter-spacing:.08em;text-transform:uppercase;}
.brand-sub{font-size:11px;color:var(--text2);letter-spacing:.12em;text-transform:uppercase;}
.status-indicator{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.status-dot{width:8px;height:8px;border-radius:50%;background:#555;}
.status-dot.connected{background:var(--done);}
.split{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;}
.pane{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.pane:last-child{border-right:none;}
.pane-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;background:var(--panel);flex-shrink:0;}
.pane-title{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.pane-title i{font-size:17px;color:var(--green-light);}
.add-row{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.add-row input{flex:1;background:#222;border:1px solid var(--border-strong);border-radius:5px;padding:8px 12px;font-size:14px;color:var(--text);outline:none;}
.add-row input:focus{border-color:var(--green-light);}
.add-row input::placeholder{color:var(--text2);}
.add-row button{background:var(--green);border:none;border-radius:5px;padding:8px 14px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;text-transform:uppercase;}
.add-row button:hover{background:var(--green-light);}
.items{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.items::-webkit-scrollbar{width:3px;}
.items::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
.item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;display:flex;flex-direction:column;gap:7px;transition:background .12s,border-color .12s;}
.item:hover{background:var(--card-hover);border-color:var(--border-strong);}
.item-title{font-size:15px;color:var(--text);line-height:1.4;flex:1;}
.item-date{font-size:12px;color:var(--text2);}
.item-row{display:flex;align-items:center;gap:6px;}
.item-actions{display:flex;align-items:center;gap:3px;margin-left:auto;opacity:0;transition:opacity .12s;}
.item:hover .item-actions{opacity:1;}
.ibtn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:3px 6px;border-radius:4px;transition:background .1s,color .1s;}
.ibtn:hover{background:rgba(67,160,71,.12);color:var(--green-light);}
.ibtn.del:hover{background:rgba(229,57,53,.1);color:var(--blocked);}
.ibtn.save-btn:hover{background:rgba(67,160,71,.18);color:var(--done);}
.ibtn.cancel-btn:hover{background:rgba(229,57,53,.08);color:var(--blocked);}
.edit-input{flex:1;background:#1e1e1e;border:1px solid var(--green-light);border-radius:5px;padding:6px 10px;font-size:15px;color:var(--text);outline:none;line-height:1.4;}
.badge{font-size:11px;font-weight:700;padding:3px 11px;border-radius:10px;border:1px solid;white-space:nowrap;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;position:relative;}
.badge.pending{color:var(--pending);border-color:var(--pending);background:rgba(224,160,32,.1);}
.badge.inprog{color:var(--inprog);border-color:var(--inprog);background:rgba(33,150,243,.1);}
.badge.done{color:var(--done);border-color:var(--done);background:rgba(67,160,71,.1);}
.badge.blocked{color:var(--blocked);border-color:var(--blocked);background:rgba(229,57,53,.1);}
.smenu{position:absolute;right:0;top:calc(100% + 3px);background:var(--panel);border:1px solid var(--border-strong);border-radius:7px;z-index:99;min-width:130px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.sopt{padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;text-transform:uppercase;color:var(--text);letter-spacing:.03em;}
.sopt:hover{background:rgba(67,160,71,.12);}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:32px 0;color:var(--text2);}
.empty i{font-size:30px;opacity:.35;}
.empty p{font-size:13px;}
.loading{display:flex;align-items:center;justify-content:center;padding:32px 0;color:var(--text2);font-size:13px;gap:8px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">A</div>
    <div class="brand">
      <span class="brand-name">Aristocrat Interactive</span>
      <span class="brand-sub">NOC Team</span>
    </div>
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>
  <div class="split">
    <div class="pane">
      <div class="pane-header">
        <div class="pane-title"><i class="ti ti-server"></i>Operations</div>
      </div>
      <div class="add-row">
        <input id="ops-input" type="text" placeholder="Item Title" onkeydown="if(event.key==='Enter')addItem('ops')">
        <button onclick="addItem('ops')">ADD ITEM</button>
      </div>
      <div class="items" id="ops-list"><div class="loading"><i class="ti ti-loader"></i> Loading...</div></div>
    </div>
    <div class="pane">
      <div class="pane-header">
        <div class="pane-title"><i class="ti ti-clipboard-list"></i>Tasks</div>
      </div>
      <div class="add-row">
        <input id="tasks-input" type="text" placeholder="Item Title" onkeydown="if(event.key==='Enter')addItem('tasks')">
        <button onclick="addItem('tasks')">ADD ITEM</button>
      </div>
      <div class="items" id="tasks-list"><div class="loading"><i class="ti ti-loader"></i> Loading...</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCppKSjwSJKx_I9bKI2KbkseIth51eBkx4",
  authDomain: "team-noc-77deb.firebaseapp.com",
  databaseURL: "https://team-noc-77deb-default-rtdb.firebaseio.com",
  projectId: "team-noc-77deb",
  storageBucket: "team-noc-77deb.firebasestorage.app",
  messagingSenderId: "889586340181",
  appId: "1:889586340181:web:01d62bbd23b9b02f245fdc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const SC={Pending:'pending','In Progress':'inprog',Done:'done',Blocked:'blocked'};
const SC_COLOR={Pending:'#E0A020','In Progress':'#2196F3',Done:'#43A047',Blocked:'#E53935'};
let openMenu=null, editingId=null;
let data={ops:{}, tasks:{}};

function fmt(d){
  const dt=new Date(d);
  return dt.toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'})+', '+
    dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}

function setConnected(yes){
  document.getElementById('statusDot').className='status-dot'+(yes?' connected':'');
  document.getElementById('statusText').textContent=yes?'Live':'Offline';
}

function render(pane){
  const el=document.getElementById(pane+'-list');
  const items=Object.entries(data[pane]||{}).sort((a,b)=>b[1].date-a[1].date);
  if(!items.length){
    el.innerHTML='<div class="empty"><i class="ti ti-inbox-off"></i><p>No items</p></div>';
    return;
  }
  el.innerHTML=items.map(([key,t])=>{
    const isEditing=editingId===key;
    return `<div class="item" id="item-${key}">
      <div class="item-row">
        ${isEditing
          ? `<input class="edit-input" id="edit-${key}" value="${t.title.replace(/"/g,'&quot;')}" onkeydown="handleEditKey(event,'${pane}','${key}')">`
          : `<div class="item-title">${t.title}</div>`
        }
        <div class="item-actions" style="opacity:${isEditing?1:''}">
          ${isEditing
            ? `<button class="ibtn save-btn" onclick="saveEdit('${pane}','${key}')" title="Save"><i class="ti ti-check"></i></button>
               <button class="ibtn cancel-btn" onclick="cancelEdit()" title="Cancel"><i class="ti ti-x"></i></button>`
            : `<button class="ibtn" onclick="startEdit('${pane}','${key}')" title="Edit"><i class="ti ti-pencil"></i></button>
               <button class="ibtn del" onclick="delItem('${pane}','${key}')" title="Delete"><i class="ti ti-trash"></i></button>`
          }
        </div>
      </div>
      <div class="item-row">
        <span class="item-date">${fmt(t.date)}</span>
        <div style="margin-left:auto;position:relative;">
          <div class="badge ${SC[t.status]}" onclick="toggleMenu('${key}','${pane}',event)">${t.status} <i class="ti ti-chevron-down" style="font-size:10px;vertical-align:1px;"></i></div>
          <div class="smenu" id="smenu-${key}" style="display:none;">
            ${Object.keys(SC).map(s=>`<div class="sopt" onclick="setStatus('${pane}','${key}','${s}')"><span class="sdot" style="background:${SC_COLOR[s]}"></span>${s}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  if(editingId){
    const inp=document.getElementById('edit-'+editingId);
    if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
  }
}

['ops','tasks'].forEach(pane=>{
  onValue(ref(db, pane), snap=>{
    data[pane]=snap.val()||{};
    setConnected(true);
    render(pane);
  }, ()=>setConnected(false));
});

window.addItem=function(pane){
  const inp=document.getElementById(pane+'-input');
  const v=inp.value.trim();
  if(!v)return;
  push(ref(db,pane),{title:v,status:'Pending',date:Date.now()});
  inp.value='';
};

window.delItem=function(pane,key){
  remove(ref(db,pane+'/'+key));
  if(editingId===key)editingId=null;
};

window.startEdit=function(pane,key){editingId=key;render(pane);};

window.saveEdit=function(pane,key){
  const inp=document.getElementById('edit-'+key);
  const v=inp?inp.value.trim():'';
  if(v) update(ref(db,pane+'/'+key),{title:v});
  editingId=null;
};

window.cancelEdit=function(){
  editingId=null;
  render('ops');render('tasks');
};

window.handleEditKey=function(e,pane,key){
  if(e.key==='Enter')saveEdit(pane,key);
  if(e.key==='Escape')cancelEdit();
};

window.toggleMenu=function(key,pane,e){
  e.stopPropagation();
  const m=document.getElementById('smenu-'+key);
  if(openMenu&&openMenu!==m)openMenu.style.display='none';
  const show=m.style.display==='none';
  m.style.display=show?'block':'none';
  openMenu=show?m:null;
};

window.setStatus=function(pane,key,status){
  update(ref(db,pane+'/'+key),{status});
  if(openMenu){openMenu.style.display='none';openMenu=null;}
};

document.addEventListener('click',()=>{
  if(openMenu){openMenu.style.display='none';openMenu=null;}
});
</script>
</body>
</html>
